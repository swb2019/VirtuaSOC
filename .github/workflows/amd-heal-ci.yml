# AMD-KIT wrapper (generated)
name: AMD Heal CI (main)
on:
  workflow_run:
    workflows: ["AMD CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read

jobs:
  heal:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main' }}
    uses: swb2019/amd-kit/.github/workflows/amd-heal-ci.yml@v1.4
    with:
      base_ref: "main"
      head_sha: ${{ github.event.workflow_run.head_sha }}
      run_url: ${{ github.event.workflow_run.html_url }}
      branch_prefix: "cursor/autofix-ci-"
      model: ""
      install_cmd: "pnpm install --frozen-lockfile"
      test_cmd: "pnpm test"
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}


