name: AMD Autopilot

on:
  schedule:
    # every 30 minutes; adjust if you like
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  autopilot:
    uses: swb2019/amd-kit/.github/workflows/amd-autopilot.yml@v1.5.2
    with:
      base_ref: main
      branch_prefix: cursor/autopilot-
      model: ""  # let kit/default choose model, or set explicitly
      install_cmd: pnpm install --frozen-lockfile
      test_cmd: pnpm test
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
