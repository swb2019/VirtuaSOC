# AMD-KIT wrapper (generated)
name: AMD Auto-merge Cursor PRs
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    uses: swb2019/amd-kit/.github/workflows/amd-automerge.yml@v1
    with:
      pr_number: ${{ github.event.pull_request.number }}
      head_ref: ${{ github.event.pull_request.head.ref }}
      is_draft: ${{ github.event.pull_request.draft }}
      allowed_head_prefix: "cursor/"
      forbidden_regex: "^(\\.github/workflows/|\\.cursor/rules/)"
    secrets: inherit
